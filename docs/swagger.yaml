host: localhost:5050
info:
  contact: {}
  description: Todo Application REST-API scheme
  title: Golang Todo API
  version: "1.0"
paths:
  /lists:
    get:
      description: Просмотр списка списков))) с опциональной фильтрацией по автору
      parameters:
      - description: Получение списков конкретного пользователя по его id
        in: query
        name: user_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Список списков))) успешно отдан
          schema:
            items:
              $ref: '#/definitions/internal_features_lists_transport_http.ListDTOResponse'
            type: array
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_med0viy_practika_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_med0viy_practika_internal_core_transport_http_response.ErrorResponse'
      summary: Список списков)))
      tags:
      - lists
    post:
      consumes:
      - application/json
      description: Создать новый список в системе
      parameters:
      - description: CreateList тело запроса
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_lists_transport_http.CreateListRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Успешно созданный список
          schema:
            $ref: '#/definitions/internal_features_lists_transport_http.CreateListResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_med0viy_practika_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: Author not found
          schema:
            $ref: '#/definitions/github_com_med0viy_practika_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_med0viy_practika_internal_core_transport_http_response.ErrorResponse'
      summary: Cоздать список
      tags:
      - lists
  /lists/{id}:
    delete:
      description: Удалить существующий в системе список по его ID
      parameters:
      - description: ID удаляемого списка
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: Успешное удаление списка
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_med0viy_practika_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: List not found
          schema:
            $ref: '#/definitions/github_com_med0viy_practika_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_med0viy_practika_internal_core_transport_http_response.ErrorResponse'
      summary: Удалить список
      tags:
      - lists
    get:
      description: Получение конкретного списка по его ID
      parameters:
      - description: ID получаемого списка
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Список успешно найден
          schema:
            $ref: '#/definitions/internal_features_lists_transport_http.GetListResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_med0viy_practika_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: List not found
          schema:
            $ref: '#/definitions/github_com_med0viy_practika_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_med0viy_practika_internal_core_transport_http_response.ErrorResponse'
      summary: Получить список
      tags:
      - lists
    patch:
      consumes:
      - application/json
      description: |-
        Измение информации об уже существующем в системе списке
        ### Логика обновления полей (Three-state logic):
        1. **Поле не передано**: `name` игнорируется, значение в БД не меняется
        2. **Явно передано значение**: `"name": "Работа"` - устанавливает новое имя списка в БД
        3. **Передан null**: `"name": null` - очищает поле в БД (set to NULL)
      parameters:
      - description: ID изменяемого списка
        in: path
        name: id
        required: true
        type: integer
      - description: PatchList тело запроса
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_lists_transport_http.PatchListRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Успешно изменнённый список
          schema:
            $ref: '#/definitions/internal_features_lists_transport_http.PatchListResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_med0viy_practika_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: List not found
          schema:
            $ref: '#/definitions/github_com_med0viy_practika_internal_core_transport_http_response.ErrorResponse'
        "409":
          description: Сonflict
          schema:
            $ref: '#/definitions/github_com_med0viy_practika_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_med0viy_practika_internal_core_transport_http_response.ErrorResponse'
      summary: Измененить список
      tags:
      - lists
  /statistics:
    get:
      description: Получение статистики по задачам с опциональной фильтрацией по user_id
        и/или временному промежутку
      parameters:
      - description: Фильтрация статистики по конкретному пользователю
        in: query
        name: user_id
        type: integer
      - description: 'Начало промежутка рассмотрения статистики (включительно), формат:
          YYYY-MM-DD'
        in: query
        name: from
        type: string
      - description: 'Конец промежутка рассмотрения статистики (не включительно),
          формат: YYYY-MM-DD'
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Успешное получение статистики
          schema:
            $ref: '#/definitions/internal_features_statistics_transport_http.GetStatisticsResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_med0viy_practika_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_med0viy_practika_internal_core_transport_http_response.ErrorResponse'
      summary: Получение статистики
      tags:
      - statistics
  /tasks:
    get:
      description: Просмотр списка задач с опциональной пагинацией и/или фильтрацией
        по ID автора/списка
      parameters:
      - description: Фильтрация задач по ID автора
        in: query
        name: user_id
        type: integer
      - description: Фильтрация задач из по ID списка
        in: query
        name: list_id
        type: integer
      - description: Размер страницы с задачами
        in: query
        name: limit
        type: integer
      - description: Смещение страницы с задачами
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Список задач успешно отдан
          schema:
            items:
              $ref: '#/definitions/internal_features_tasks_transport_http.TaskDTOResponse'
            type: array
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_med0viy_practika_internal_core_transport_http_response.ErrorResponse'
        "500":
