<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>med0viy to-do</title>
    <meta name="description" content="Современное приложение для управления задачами со статистикой.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
:root {
    /* Light Theme */
    --bg-app: #f4f6fa;
    --bg-sidebar: rgba(255, 255, 255, 0.7);
    --bg-main: rgba(255, 255, 255, 0.9);
    --bg-input: #ffffff;
    --bg-task: #ffffff;
    --bg-task-hover: #f8fafc;
    --text-primary: #1e293b;
    --text-secondary: #64748b;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --danger: #ef4444;
    --success: #10b981;
    --border: #e2e8f0;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
    --glass-blur: blur(16px);
    
    /* Variables for Stats */
    --stat-created: #8b5cf6;
    --stat-completed: #10b981;
    --stat-rate: #f59e0b;
    --stat-time: #3b82f6;
}

[data-theme="dark"] {
    color-scheme: dark;
    --bg-app: #0f172a;
    --bg-sidebar: rgba(30, 41, 59, 0.7);
    --bg-main: rgba(30, 41, 59, 0.9);
    --bg-input: #1e293b;
    --bg-task: #1e293b;
    --bg-task-hover: #27354f;
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --accent: #60a5fa;
    --accent-hover: #3b82f6;
    --border: #334155;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.4);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.5);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
    transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
}

body {
    background-color: var(--bg-app);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    /* Soft dynamic background gradient for premium feel */
    background-image: 
        radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
    background-attachment: fixed;
}

.app-container {
    display: flex;
    height: 100%;
    max-width: 1600px;
    margin: 0 auto;
}

/* Sidebar Styling */
.sidebar {
    width: 280px;
    background-color: var(--bg-sidebar);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 20px 10px;
    z-index: 10;
}

.user-profile {
    display: flex;
    align-items: center;
    padding: 10px 15px;
    margin-bottom: 20px;
    border-radius: 12px;
    cursor: pointer;
}

.user-profile:hover {
    background-color: var(--bg-task-hover);
}

.avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--stat-created));
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    margin-right: 15px;
    box-shadow: var(--shadow-sm);
}

.user-info h3 {
    font-size: 0.95rem;
    font-weight: 600;
}

.user-info p {
    font-size: 0.8rem;
    color: var(--text-secondary);
}

.nav-menu {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
    overflow-y: auto;
}

.nav-menu::-webkit-scrollbar {
    width: 4px;
}

.nav-menu::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 4px;
}

.nav-item {
    display: flex;
    align-items: center;
    padding: 12px 15px;
    border-radius: 8px;
    color: var(--text-primary);
    text-decoration: none;
    font-weight: 500;
    font-size: 0.95rem;
    position: relative;
    overflow: hidden;
}

.nav-item i {
    width: 24px;
    font-size: 1.1rem;
    margin-right: 12px;
    color: var(--text-secondary);
    transition: color 0.3s ease, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.nav-item:hover {
    background-color: var(--bg-task-hover);
}

.nav-item:hover i {
    transform: scale(1.1);
}

.nav-item.active {
    background-color: var(--bg-input);
    box-shadow: var(--shadow-sm);
    color: var(--accent);
}

.nav-item.active i {
    color: var(--accent);
}

.nav-item.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 20px;
    background-color: var(--accent);
    border-radius: 0 4px 4px 0;
}

.divider {
    height: 1px;
    background-color: var(--border);
    margin: 15px 15px;
}

.new-list-btn {
    color: var(--text-secondary);
}

/* Main Content */
.main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 0;
    position: relative;
    background-color: var(--bg-main);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
}

.main-header {
    padding: 30px 40px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
}

.header-titles h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 5px;
}

.date-subtitle {
    color: var(--accent);
    font-size: 0.9rem;
    font-weight: 500;
}

.header-actions .header-actions {
    display: flex;
    align-items: center;
}

.lang-toggle {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 8px;
    margin-right: 5px;
    font-family: 'Inter', sans-serif;
    transition: 0.2s;
}

.lang-toggle:hover {
    background-color: var(--bg-task-hover);
    color: var(--text-primary);
}

.theme-toggle {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    font-size: 1.2rem;
    cursor: pointer;
    padding: 8px;
    border-radius: 50%;
}

.theme-toggle:hover {
    background-color: var(--bg-task-hover);
    color: var(--text-primary);
}

.task-view-container, .statistics-view-container, .users-view-container {
    padding: 0 40px;
    flex: 1;
    overflow-y: auto;
    opacity: 0;
    visibility: hidden;
    position: absolute;
    top: 100px;
    left: 0;
    right: 0;
    bottom: 0;
    transition: opacity 0.4s ease, transform 0.4s ease;
    transform: translateY(10px);
}

.task-view-container.active, .statistics-view-container.active, .users-view-container.active {
    opacity: 1;
    visibility: visible;
    position: relative;
    top: 0;
    transform: translateY(0);
}

/* Add Task Input */
.add-task-container {
    margin-bottom: 30px;
}

.add-task-input-wrapper {
    display: flex;
    align-items: center;
    background-color: var(--bg-input);
    border-radius: 12px;
    padding: 5px 15px;
    box-shadow: var(--shadow-md);
    border: 1px solid transparent;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}

.add-task-input-wrapper:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2), var(--shadow-lg);
    transform: translateY(-2px);
}

.input-icon {
    color: var(--accent);
    margin-right: 15px;
}

#new-task-input {
    flex: 1;
    border: none;
    background: transparent;
    padding: 15px 0;
    font-size: 1rem;
    color: var(--text-primary);
    outline: none;
}

#new-task-input::placeholder {
    color: var(--text-secondary);
}

.task-input-actions {
    display: flex;
    align-items: center;
    gap: 10px;
}

.date-input {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    font-size: 0.9rem;
    padding: 5px;
    margin-right: 15px;
    outline: none;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: color 0.2s;
}

.date-input::-webkit-calendar-picker-indicator {
    cursor: pointer;
    opacity: 0.6;
    transition: 0.2s;
}

.date-input::-webkit-calendar-picker-indicator:hover {
    opacity: 1;
}

[data-theme="dark"] .date-input::-webkit-calendar-picker-indicator {
    filter: invert(1);
}

.date-input:hover {
    color: var(--accent);
}

.action-btn {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    font-size: 1.2rem;
    cursor: pointer;
    padding: 5px;
    border-radius: 50%;
}

.action-btn:hover {
    color: var(--accent);
}

.action-btn.active {
    color: var(--stat-rate);
}

.action-btn.active i {
    font-weight: 900;
}

.add-btn {
    background-color: var(--accent);
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    font-weight: 500;
    cursor: pointer;
    opacity: 0;
    transform: scale(0.9);
    transition: all 0.2s ease;
    pointer-events: none;
}

.add-task-input-wrapper:focus-within .add-btn {
    opacity: 1;
    transform: scale(1);
    pointer-events: auto;
}

.add-btn:hover {
    background-color: var(--accent-hover);
}

/* Tasks List */
.tasks-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 30px;
}

.task-item {
    display: flex;
    align-items: center;
    background-color: var(--bg-task);
    border-radius: 10px;
    padding: 15px 20px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
    animation: slideIn 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
    transform-origin: top;
    transition: transform 0.2s, box-shadow 0.2s;
}

.task-item:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
}

.task-checkbox {
    appearance: none;
    width: 22px;
    height: 22px;
    border: 2px solid var(--text-secondary);
    border-radius: 50%;
    margin-right: 15px;
    cursor: pointer;
    position: relative;
    transition: all 0.2s ease;
    flex-shrink: 0;
}

.task-checkbox:hover {
    border-color: var(--accent);
    background-color: rgba(59, 130, 246, 0.1);
}

.task-checkbox:checked {
    border-color: var(--accent);
    background-color: var(--accent);
}

.task-checkbox:checked::after {
    content: '';
    position: absolute;
    top: 5px;
    left: 8px;
    width: 4px;
    height: 8px;
    border: solid white;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
    animation: checkmark 0.2s ease-in-out forwards;
}

.task-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.task-title {
    font-size: 1rem;
    color: var(--text-primary);
    transition: color 0.3s;
}

.task-meta {
    font-size: 0.75rem;
    color: var(--text-secondary);
    margin-top: 4px;
    display: flex;
    gap: 15px;
}

.task-meta-item {
    display: flex;
    align-items: center;
    gap: 4px;
}

.task-item.completed .task-title {
    color: var(--text-secondary);
    text-decoration: line-through;
}

.task-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    opacity: 0;
    transition: opacity 0.2s;
}

.task-item:hover .task-actions {
    opacity: 1;
}

.task-star-btn, .task-delete-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 1.1rem;
    color: var(--text-secondary);
    transition: all 0.2s;
    padding: 5px;
}

.task-star-btn:hover { color: var(--stat-rate); }
.task-star-btn.is-important { color: var(--stat-rate); }
.task-star-btn.is-important i { font-weight: 900; }

.task-delete-btn:hover { color: var(--danger); }

/* Completed Section */
.completed-tasks-section {
    margin-top: 30px;
}

.toggle-completed-btn {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    font-size: 0.9rem;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    padding: 10px 0;
}

.toggle-completed-btn i {
    transition: transform 0.3s;
}

.toggle-completed-btn.open i {
    transform: rotate(90deg);
}

.toggle-completed-btn .count {
    background-color: var(--border);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 0.8rem;
}

.completed-list {
    margin-top: 15px;
    opacity: 1;
    transform-origin: top;
    transition: all 0.3s ease;
}

.completed-list.hidden {
    display: none;
}

/* Statistics View */
.stats-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

.stat-card {
    background-color: var(--bg-task);
    border-radius: 16px;
    padding: 25px;
    display: flex;
    align-items: center;
    box-shadow: var(--shadow-md);
    border: 1px solid var(--border);
    transition: transform 0.3s, box-shadow 0.3s;
}

.stat-card:hover {
    transform: translateY(-5px);
    box-shadow: var(--shadow-lg);
}

.stat-icon {
    width: 60px;
    height: 60px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    margin-right: 20px;
    color: white;
}

.stat-icon.created { background: linear-gradient(135deg, #a78bfa, var(--stat-created)); }
.stat-icon.completed { background: linear-gradient(135deg, #34d399, var(--stat-completed)); }
.stat-icon.rate { background: linear-gradient(135deg, #fbbf24, var(--stat-rate)); }
.stat-icon.time { background: linear-gradient(135deg, #93c5fd, var(--stat-time)); }

.stat-info h3 {
    font-size: 0.9rem;
    color: var(--text-secondary);
    font-weight: 500;
    margin-bottom: 5px;
}

.stat-value {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--text-primary);
}

.progress-bar-container {
    width: 100%;
    height: 6px;
    background-color: var(--border);
    border-radius: 3px;
    margin-top: 10px;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    background-color: var(--stat-rate);
    border-radius: 3px;
    width: 0%;
    /* CSS transition disabled since JS animates it smoothly */
}

.users-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
}
.user-card {
    background-color: var(--bg-task);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    transition: border-color 0.2s, background-color 0.2s;
    cursor: pointer;
}
.user-card:hover {
    border-color: var(--accent);
}
.user-card.active-user {
    border-color: var(--accent);
    background-color: var(--bg-task-hover);
}
.user-card .user-avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: bold;
    font-size: 1.5rem;
    margin-bottom: 15px;
}
.user-card h3 {
    margin-bottom: 5px;
    font-size: 1.1rem;
}
.user-card p {
    color: var(--text-secondary);
    font-size: 0.9rem;
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.user-card .badges {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}
.user-card .badge {
    background-color: var(--bg-input);
    padding: 4px 8px;
    border-radius: 12px;
    font-size: 0.8rem;
    color: var(--text-secondary);
    border: 1px solid var(--border);
}
.user-card .card-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
}
.user-card .action-btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: 0.2s;
}
.user-card .action-btn-outline:hover {
    background: var(--bg-input);
}
.user-card .action-btn-outline.delete {
    color: var(--danger);
    border-color: rgba(239, 68, 68, 0.3);
}
.user-card .action-btn-outline.delete:hover {
    background: rgba(239, 68, 68, 0.1);
    border-color: var(--danger);
}

/* Modals */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 1;
    visibility: visible;
    transition: all 0.3s;
}

.modal-overlay.hidden {
    opacity: 0;
    visibility: hidden;
}

.modal-content {
    background-color: var(--bg-main);
    padding: 30px;
    border-radius: 16px;
    width: 90%;
    max-width: 400px;
    box-shadow: var(--shadow-lg);
    transform: scale(1);
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.modal-overlay.hidden .modal-content {
    transform: scale(0.9);
}

.modal-content h2 {
    margin-bottom: 20px;
    font-size: 1.4rem;
}

.modal-content input {
    width: 100%;
    padding: 12px 15px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background-color: var(--bg-input);
    color: var(--text-primary);
    font-size: 1rem;
    margin-bottom: 20px;
    outline: none;
    transition: border-color 0.2s;
}

.modal-content input:focus {
    border-color: var(--accent);
}

.modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
}

.btn-cancel, .btn-primary {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
}

.btn-cancel {
    background-color: transparent;
    color: var(--text-secondary);
}

.btn-cancel:hover {
    background-color: var(--bg-task-hover);
    color: var(--text-primary);
}

.btn-primary {
    background-color: var(--accent);
    color: white;
}

.btn-primary:hover {
    background-color: var(--accent-hover);
}

/* Notifications */
.notifications-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 1000;
}

.notification {
    background-color: var(--bg-task);
    color: var(--text-primary);
    padding: 15px 20px;
    border-radius: 8px;
    box-shadow: var(--shadow-md);
    border-left: 4px solid var(--accent);
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slideInRight 0.3s forwards, fadeOut 0.3s 3s forwards;
    min-width: 250px;
}

.notification.error {
    border-left-color: var(--danger);
}
.notification.success {
    border-left-color: var(--success);
}

/* Animations */
@keyframes slideIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes slideOut {
    from { opacity: 1; transform: scale(1); }
    to { opacity: 0; transform: scale(0.9); }
}

@keyframes checkmark {
    0% { height: 0; width: 0; opacity: 1; }
    20% { height: 0; width: 4px; opacity: 1; }
    100% { height: 8px; width: 4px; opacity: 1; }
}

@keyframes slideInRight {
    from { opacity: 0; transform: translateX(50px); }
    to { opacity: 1; transform: translateX(0); }
}

@keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
}

/* Responsive */
@media (max-width: 768px) {
    .app-container {
        flex-direction: column;
    }
    .sidebar {
        width: 100%;
        height: auto;
        flex-direction: row;
        overflow-x: auto;
        padding: 10px;
        border-right: none;
        border-bottom: 1px solid var(--border);
    }
    .user-profile, .divider { display: none; }
    .nav-menu {
        flex-direction: row;
        gap: 10px;
    }
    .nav-item span { display: none; }
    .nav-item { padding: 10px; }
    .nav-item i { margin: 0; }
    .task-view-container, .statistics-view-container, .users-view-container {
        padding: 0 20px;
    }
    .main-header {
        padding: 20px;
    }
}

</style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->

// Setup Event Listeners
function setupEventListeners() {
    // Theme toggle
    elements.themeToggle.addEventListener('click', () => {
        state.theme = state.theme === 'light' ? 'dark' : 'light';
        localStorage.setItem('theme', state.theme);
        applyTheme();
    });

    // Navigation
    elements.navItems.forEach(item => {
        if(item.id === 'new-list-btn') return;
        
        item.addEventListener('click', (e) => {
            e.preventDefault();
            const view = item.dataset.view;
            const listId = item.dataset.listId;
            
            if(view) {
                switchView(view, listId ? parseInt(listId) : null);
            }
        });
    });

    // Task Input
    elements.newTaskInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && elements.newTaskInput.value.trim() !== '') {
            createTask();
        }
    });

    elements.addTaskBtn.addEventListener('click', createTask);
    
    elements.markImportantBtn.addEventListener('click', () => {
        elements.markImportantBtn.classList.toggle('active');
        const icon = elements.markImportantBtn.querySelector('i');
        if(elements.markImportantBtn.classList.contains('active')){
            icon.classList.remove('fa-regular');
            icon.classList.add('fa-solid');
        } else {
            icon.classList.remove('fa-solid');
            icon.classList.add('fa-regular');
        }
    });

    // Completed Tasks Toggle
    elements.toggleCompletedBtn.addEventListener('click', () => {
        const isHidden = elements.completedTasksList.classList.contains('hidden');
        if (isHidden) {
            elements.completedTasksList.classList.remove('hidden');
            elements.toggleCompletedBtn.classList.add('open');
        } else {
            elements.completedTasksList.classList.add('hidden');
            elements.toggleCompletedBtn.classList.remove('open');
        }
    });

    // Lists Modal
    elements.newListBtn.addEventListener('click', (e) => {
        e.preventDefault();
        elements.createListModal.classList.remove('hidden');
        setTimeout(() => elements.newListInput.focus(), 100);
    });

    elements.cancelListBtn.addEventListener('click', () => {
        closeListModal();
    });

    elements.confirmListBtn.addEventListener('click', createList);
    elements.newListInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') createList();
    });

    elements.deleteListBtn.addEventListener('click', () => {
        if(state.currentListId) {
            if(confirm(t('deleteListConfirm'))) {
                deleteList(state.currentListId);
            }
        }
    });

    // Lang toggle
    elements.langToggle.addEventListener('click', () => {
        state.lang = state.lang === 'ru' ? 'en' : 'ru';
        localStorage.setItem('lang', state.lang);
        applyLanguage();
        if(state.users.length > 0) renderTasks(); // Re-render tasks for translated text

function applyTheme() {
    document.documentElement.setAttribute('data-theme', state.theme);
    const icon = elements.themeToggle.querySelector('i');
    if (state.theme === 'dark') {
        icon.className = 'fa-solid fa-sun';
    } else {
        icon.className = 'fa-solid fa-moon';
    }
}

function updateDateSubtitle() {
    const options = { weekday: 'long', month: 'long', day: 'numeric' };
    const locale = state.lang === 'ru' ? 'ru-RU' : 'en-US';
    const dateStr = new Date().toLocaleDateString(locale, options);
    elements.viewSubtitle.textContent = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
}

function applyLanguage() {
    elements.langToggle.textContent = state.lang === 'ru' ? 'EN' : 'RU';
    
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (i18n[state.lang][key]) el.textContent = i18n[state.lang][key];
    });
    
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.getAttribute('data-i18n-placeholder');
        if (i18n[state.lang][key]) el.placeholder = i18n[state.lang][key];
    });

    // update user fallback
    if(state.users.length === 0) {
        document.getElementById('current-user-name').textContent = t('noUsers');
    }

    // Refresh view title
    if(state.currentView) {
        switchView(state.currentView, state.currentListId);
    }
}

// Navigation Logic
function switchView(view, listId = null) {
    if(!CURRENT_USER_ID && view !== 'users') {
        showNotification(t('chooseUser'), 'error');
        switchView('users');
        return;
    }

    state.currentView = view;
    state.currentListId = listId;
    
    // Update active nav state
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    
    // Default hiding
    elements.taskView.classList.remove('active');
    elements.statsView.classList.remove('active');
    if (elements.usersView) elements.usersView.classList.remove('active');
    if (elements.newUserHeaderBtn) elements.newUserHeaderBtn.classList.add('hidden');
    elements.editListBtn.classList.add('hidden');
    elements.deleteListBtn.classList.add('hidden');

    if (view === 'statistics') {
        elements.statsView.classList.add('active');
        elements.viewTitle.textContent = t('stats');
        elements.viewSubtitle.textContent = '';
        fetchStatistics();
    } else if (view === 'users') {
        if (elements.usersView) elements.usersView.classList.add('active');
        if (elements.newUserHeaderBtn) elements.newUserHeaderBtn.classList.remove('hidden');
        elements.viewTitle.textContent = t('users') || 'Пользователи';
        elements.viewSubtitle.textContent = '';
        renderUsersList();
    } else {
        elements.taskView.classList.add('active');
        
        if (listId) {
            const listEl = document.querySelector(`.nav-item[data-list-id="${listId}"]`);
            if (listEl) listEl.classList.add('active');
            
            const listObj = state.lists.find(l => l.id === listId);
            elements.viewTitle.textContent = listObj ? listObj.name : t('listStr');
            elements.deleteListBtn.classList.remove('hidden');
            elements.editListBtn.classList.remove('hidden');
        } else {
            const viewEl = document.querySelector(`.nav-item[data-view="${view}"]:not([data-list-id])`);
            if (viewEl) viewEl.classList.add('active');
            
            const titles = {
                'my-day': t('myDay'),
                'important': t('important'),
                'tasks': t('tasks'),
                'statistics': t('stats')
            };
            elements.viewTitle.textContent = titles[view] || t('tasks');
        }
        
        updateDateSubtitle();
        
        // Ensure important button reflects current view default
        if (view === 'important') {
            elements.markImportantBtn.classList.add('active');
            elements.markImportantBtn.querySelector('i').className = 'fa-solid fa-star';
        } else {
            elements.markImportantBtn.classList.remove('active');
            elements.markImportantBtn.querySelector('i').className = 'fa-regular fa-star';
        }

        renderTasks();
    }
}

// API Calls
async function apiCall(endpoint, method = 'GET', body = null) {
    try {
        const options = {
            method,
            headers: {
                'Content-Type': 'application/json'
            }
        };
        if (body) {
            options.body = JSON.stringify(body);
        }
        
        const response = await fetch(`${API_BASE}${endpoint}`, options);
        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`Ошибка ${response.status}: ${errorText}`);
        }
        
        // 204 No Content handling
        if (response.status === 204) return null;
        
        return await response.json();
    } catch (error) {
        showNotification(error.message, 'error');
        throw error;
    }
}

async function fetchUsers() {
    try {
        const users = await apiCall('/users');
        state.users = users || [];
        
        if (state.users.length > 0) {

            elements.userModal.classList.remove('hidden');
        }
        renderUsersList();
    } catch (e) {
        console.error("Failed to fetch users", e);
    }
}

async function createUser() {
    const fullName = elements.newUserInput.value.trim();
    if (fullName.length < 3) {
        showNotification(t('nameMin3'), 'error');
        return;
    }

    try {
        const newUser = await apiCall('/users', 'POST', {
            full_name: fullName
        });
        
        state.users.push(newUser);
        elements.newUserInput.value = '';
        switchUser(newUser.id);
        elements.userModal.classList.add('hidden');
        showNotification(t('userCreated'), 'success');
    } catch (e) {
        // error Handled
    }
}

async function updateUser() {
    const userIdToEdit = state.editingUserId || CURRENT_USER_ID;
    if (!userIdToEdit) return;
    
    const fullName = elements.editUserName.value.trim();
    const phone = elements.editUserPhone.value.trim();

    if (fullName.length < 3) {
        showNotification(t('nameMin3'), 'error');
        return;
    }

    try {
        const patchedUser = await apiCall(`/users/${userIdToEdit}`, 'PATCH', {
            full_name: fullName,
            phone_number: phone || null
        });

        const idx = state.users.findIndex(u => u.id === userIdToEdit);
        if(idx !== -1) state.users[idx] = patchedUser;
        
        elements.editUserModal.classList.add('hidden');
        showNotification(t('profileUpdated'), 'success');
        
        // Refresh UI
        if (userIdToEdit === CURRENT_USER_ID) {

        }

function switchUser(userId) {
    CURRENT_USER_ID = userId;
    const user = state.users.find(u => u.id === userId);
    if(user) {
        document.getElementById('current-user-name').textContent = user.full_name;
        
        // Update Avatar
        const avatarEl = document.querySelector('.user-profile .avatar');
        avatarEl.innerHTML = `<span style="font-weight: bold; font-size: 1.1rem;">${getInitials(user.full_name)}</span>`;
        avatarEl.style.background = getColor(user.full_name);

        elements.userModal.classList.add('hidden');
        // Refresh all data
        fetchLists();
        fetchTasks();
        
        if(state.currentView === 'statistics') {
            fetchStatistics();
        } else if (state.currentView === 'list') {
            switchView('tasks');
        }
    }
}

async function fetchTasks() {

async function createTask() {
    const title = elements.newTaskInput.value.trim();
    if (!title) return;

    const isImportant = elements.markImportantBtn.classList.contains('active') || state.currentView === 'important';
    const isInMyDay = state.currentView === 'my-day';
    
    const dueDateVal = elements.newTaskDate.value;
    const dueDate = dueDateVal ? dueDateVal : null;
    
    const newTask = {
        title: title,
        is_important: isImportant,
        is_in_my_day: isInMyDay,
        author_user_id: CURRENT_USER_ID,
        list_id: state.currentListId,
        due_date: dueDate
    };

    try {
        const createdTask = await apiCall('/tasks', 'POST', newTask);
        state.tasks.push(createdTask);
        elements.newTaskInput.value = '';
        elements.newTaskDate.value = '';
        renderTasks();
        showNotification(t('taskAdded'), 'success');
    } catch (e) {
        console.error("Failed to create task", e);
    }
}

async function toggleTaskCompletion(taskId, isCompleted) {
    try {
        const task = state.tasks.find(t => t.id === taskId);
        if(!task) return;
        
        // Optimistic update
        task.complited = isCompleted;
        renderTasks();
        
        await apiCall(`/tasks/${taskId}`, 'PATCH', {
            complited: isCompleted
        });
    } catch (e) {
        // Revert on error
        fetchTasks();
    }
}

async function toggleTaskImportance(taskId) {
    try {
        const task = state.tasks.find(t => t.id === taskId);
        if(!task) return;
        
        const newStatus = !task.is_important;
        task.is_important = newStatus;
        renderTasks(); // optimistic
        
        await apiCall(`/tasks/${taskId}`, 'PATCH', {
            is_important: newStatus
        });
    } catch (e) {
        fetchTasks();
    }
}

async function deleteTask(taskId) {
    try {
        // Optimistic
        state.tasks = state.tasks.filter(t => t.id !== taskId);
        renderTasks();
        
        await apiCall(`/tasks/${taskId}`, 'DELETE');
        showNotification(t('taskDeleted'), 'success');
    } catch(e) {
        fetchTasks();
    }
}

async function fetchStatistics() {
    if(!CURRENT_USER_ID) return;
    try {
        let url = `/statistics?user_id=${CURRENT_USER_ID}`;
        
        const listVal = elements.statsFilterList.value;
        const fromVal = elements.statsFilterFrom.value;
        const toVal = elements.statsFilterTo.value;
        
        if (listVal && listVal !== 'null') url += `&list_id=${listVal}`;
        if (fromVal) url += `&from=${fromVal}`;
        if (toVal) url += `&to=${toVal}`;

        const stats = await apiCall(url);
        if(stats) {
            // Animate numbers up
            animateValue(elements.statCreated, 0, stats.tasks_created || 0, 1500);
            animateValue(elements.statCompleted, 0, stats.tasks_complited || 0, 1500);
            
            const rate = stats.tasks_complited_rate ? Math.round(stats.tasks_complited_rate) : 0;
            animateValue(elements.statRate, 0, rate, 1500, '%', (val) => {
                elements.statRateBar.style.width = val + '%';
            });
            
            let avgTime = stats.tasks_avarage_completion_time || '-';
            // Simple format parsing if duration string
            if(avgTime !== '-') {
                // Remove milliseconds (e.g. 59.8391955s -> 59s, 1h2m3.4s -> 1h2m3s)
                avgTime = avgTime.replace(/\.\d+/g, '').replace('h', t('timeH')).replace('m', t('timeM')).replace('s', t('timeS'));
            }
            elements.statAvgTime.textContent = avgTime;
        }
    } catch (e) {
        // Let user see empty state on error
        console.error("Stats error", e);
    }
}

    elements.usersGrid.innerHTML = '';
    
    if(state.users.length === 0) {

            <div class="user-avatar" style="background: ${getColor(user.full_name)};">
                ${getInitials(user.full_name)}
            </div>
            <h3>${escapeHTML(user.full_name)}</h3>

            <div class="badges">
                <span class="badge">ID: ${user.id}</span>
                <span class="badge">v1</span>
            </div>
            <div class="card-actions">
                <button class="action-btn-outline edit-btn"><i class="fa-solid fa-pen-to-square"></i> Edit</button>
                <button class="action-btn-outline delete delete-btn"><i class="fa-solid fa-trash"></i> Delete</button>

        });

            e.stopPropagation();

                    if (user.id === CURRENT_USER_ID) {
                        CURRENT_USER_ID = null;
                        localStorage.removeItem('currentUserId');
                    }
                    await loadUsers();
                    if (!CURRENT_USER_ID && state.users.length > 0) {
                        switchUser(state.users[0].id);
                    } else {
                        renderUsersList();
                    }
                } catch(err) {}

function getFilteredTasks() {
    return state.tasks.filter(task => {
        if (state.currentView === 'my-day') return task.is_in_my_day;
        if (state.currentView === 'important') return task.is_important;
        if (state.currentView === 'list') return task.list_id === state.currentListId;
        // 'tasks' view = all tasks that do NOT belong to a custom list (or all of them)
        // Microsoft ToDo 'Tasks' view is usually tasks not in any custom list.
        if (state.currentView === 'tasks') return task.list_id === null;
        return true;
    });
}

function renderTasks() {
    const filtered = getFilteredTasks();
    const activeTasks = filtered.filter(t => !t.complited);
    const completedTasks = filtered.filter(t => t.complited);

    elements.tasksList.innerHTML = '';
    elements.completedTasksList.innerHTML = '';
    
    // Sort tasks: newest first
    activeTasks.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
    completedTasks.sort((a,b) => new Date(b.complited_at) - new Date(a.complited_at));

    activeTasks.forEach(task => elements.tasksList.appendChild(createTaskElement(task)));
    completedTasks.forEach(task => elements.completedTasksList.appendChild(createTaskElement(task)));

    elements.completedCount.textContent = completedTasks.length;
    if (completedTasks.length > 0) {
        elements.completedTasksSection = document.querySelector('.completed-tasks-section');
        elements.completedTasksSection.style.display = 'block';
    } else {
        document.querySelector('.completed-tasks-section').style.display = 'none';
    }
}

function createTaskElement(task) {
    const div = document.createElement('div');
    div.className = `task-item ${task.complited ? 'completed' : ''}`;
    
    const starIcon = task.is_important ? 'fa-solid' : 'fa-regular';
    
    div.innerHTML = `
        <input type="checkbox" class="task-checkbox" ${task.complited ? 'checked' : ''}>
        <div class="task-content">
            <span class="task-title">${escapeHTML(task.title)}</span>
            <div class="task-meta">
                ${task.list_id ? `<span class="task-meta-item"><i class="fa-solid fa-list" style="font-size:0.7rem;"></i> ${t('inList')}</span>` : ''}
                ${task.due_date ? `<span class="task-meta-item" style="color: var(--accent);"><i class="fa-regular fa-calendar" style="font-size:0.7rem;"></i> ${t('until')} ${new Date(task.due_date).toLocaleDateString(state.lang === 'ru' ? 'ru-RU' : 'en-US')}</span>` : ''}
            </div>
        </div>
        <div class="task-actions">
            <button class="task-delete-btn" title="Удалить"><i class="fa-regular fa-trash-can"></i></button>
            <button class="task-star-btn ${task.is_important ? 'is-important' : ''}">
                <i class="${starIcon} fa-star"></i>
            </button>
        </div>
    `;

    // Event listeners
    const checkbox = div.querySelector('.task-checkbox');
    checkbox.addEventListener('change', () => {
        // Add a slight delay for animation to show
        setTimeout(() => toggleTaskCompletion(task.id, checkbox.checked), 300);
    });

    const starBtn = div.querySelector('.task-star-btn');
    starBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleTaskImportance(task.id);
    });

    const deleteBtn = div.querySelector('.task-delete-btn');
    deleteBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        div.style.animation = 'slideOut 0.3s forwards';
        setTimeout(() => deleteTask(task.id), 250);
    });

    div.addEventListener('click', (e) => {
        if(e.target === checkbox || e.target.closest('.task-actions')) return;
        openEditTaskModal(task);
    });

    return div;
}

function openEditTaskModal(task) {
    state.editingTaskId = task.id;
    
    elements.editTaskTitle.value = task.title;
    elements.editTaskDesc.value = task.description || '';
    
    if (task.due_date) {
        const d = new Date(task.due_date);
        elements.editTaskDate.value = d.toISOString().split('T')[0];
    } else {
        elements.editTaskDate.value = '';
    }

    // Populate list select
    elements.editTaskList.innerHTML = `<option value="null">${t('noList')}</option>`;
    state.lists.forEach(l => {
        const option = document.createElement('option');
        option.value = l.id;
        option.textContent = l.name;
        if (task.list_id === l.id) option.selected = true;
        elements.editTaskList.appendChild(option);
    });

    elements.editTaskImportant.checked = task.is_important;
    elements.editTaskMyDay.checked = task.is_in_my_day;

    elements.editTaskModal.classList.remove('hidden');
}

async function updateTask() {
    if(!state.editingTaskId) return;

    const title = elements.editTaskTitle.value.trim();
    if(!title) return;

    const desc = elements.editTaskDesc.value.trim();
    const dateVal = elements.editTaskDate.value;
    const listVal = elements.editTaskList.value;
    
    const patchObj = {
        title: title,
        description: desc ? desc : null,
        due_date: dateVal ? dateVal : null,
        list_id: listVal === 'null' ? null : parseInt(listVal),
        is_important: elements.editTaskImportant.checked,
        is_in_my_day: elements.editTaskMyDay.checked
    };

    try {
        const patchedTask = await apiCall(`/tasks/${state.editingTaskId}`, 'PATCH', patchObj);
        
        const idx = state.tasks.findIndex(t => t.id === state.editingTaskId);
        if(idx !== -1) {
            state.tasks[idx] = patchedTask;
        }

        elements.editTaskModal.classList.add('hidden');
        state.editingTaskId = null;
        renderTasks();
        showNotification(t('taskUpdated'), 'success');
    } catch(e) {}
}

// Utils
function closeListModal() {
    elements.createListModal.classList.add('hidden');
    elements.newListInput.value = '';
}

function showNotification(message, type = 'success') {
    const el = document.createElement('div');
    el.className = `notification ${type}`;
    el.innerHTML = `
        <i class="fa-solid ${type === 'success' ? 'fa-check-circle' : 'fa-circle-exclamation'}"></i>
        <span>${escapeHTML(message)}</span>
    `;
    elements.notifications.appendChild(el);
    
    // Automatically remove after animation (3.3s total)
    setTimeout(() => {
        if(elements.notifications.contains(el)) {
            el.remove();
        }
    }, 3500);
}

function escapeHTML(str) {
    if(!str) return '';
    return str.toString().replace(/[&<>'"]/g, 
        tag => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            "'": '&#39;',
            '"': '&quot;'
        }[tag])
    );
}

function animateValue(obj, start, end, duration, suffix = '', onUpdate = null) {
    if (obj._animFrame) cancelAnimationFrame(obj._animFrame);
    let startTimestamp = null;
    const step = (timestamp) => {
        if (!startTimestamp) startTimestamp = timestamp;
        let progress = Math.min((timestamp - startTimestamp) / duration, 1);
        // easeOutQuad (gentler start, more uniform)
        const ease = 1 - (1 - progress) * (1 - progress);
        
        const currentVal = Math.floor(ease * (end - start) + start);
        obj.innerHTML = currentVal + suffix;
        if (onUpdate) onUpdate(currentVal);
        
        if (progress < 1) {
            obj._animFrame = window.requestAnimationFrame(step);
        }
    };
    obj._animFrame = window.requestAnimationFrame(step);
}

function getInitials(name) {
    if (!name) return 'U';
    const parts = name.trim().split(/\s+/);
    if (parts.length === 1) {
        const w = parts[0];
        if (w.length > 1) return (w[0] + w[w.length - 1]).toUpperCase();
        return w[0].toUpperCase();
    }
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}

function getColor(name) {
    if (!name) return 'var(--accent)';
    let hash = 0;
    for (let i = 0; i < name.length; i++) {
        hash = name.charCodeAt(i) + ((hash << 5) - hash);
    }
    const hue = Math.abs(hash % 360);
    return `hsl(${hue}, 65%, 50%)`;
}
